<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="100%" height="100%" style="background: #0f172a; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <!-- Background -->
  <rect width="960" height="520" fill="#0f172a" />
  <rect x="20" y="20" width="920" height="480" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />

  <!-- Diagram Title -->
  <text x="480" y="60" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="0.5">MCLOUD SAAS — SYSTEM ARCHITECTURE SCHEMATIC</text>
  <text x="480" y="80" font-size="12" fill="#94a3b8" text-anchor="middle">Monorepo Microservices • PM2 Cluster Orchestration • Docker Engine</text>

  <!-- Client Box -->
  <g transform="translate(60, 120)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
    <text x="80" y="32" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">External Client</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">HTTPS / WebSocket</text>
  </g>

  <!-- Nginx Proxy Box -->
  <g transform="translate(280, 120)">
    <rect width="180" height="70" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" />
    <text x="90" y="32" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">Nginx Reverse Proxy</text>
    <text x="90" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Port 80/443 • SSL</text>
  </g>

  <!-- Frontend SPA Box -->
  <g transform="translate(520, 120)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
    <text x="80" y="32" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">React 19 Frontend</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Vite SPA • Static</text>
  </g>

  <!-- API Gateway Box -->
  <g transform="translate(280, 240)">
    <rect width="180" height="70" rx="6" fill="#0f172a" stroke="#818cf8" stroke-width="1.5" />
    <text x="90" y="32" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">API Gateway</text>
    <text x="90" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Port 3000 • PM2</text>
  </g>

  <!-- Microservices Layer -->
  <g transform="translate(60, 380)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5" />
    <text x="80" y="32" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Auth Service</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Port 3001 • JWT</text>
  </g>

  <g transform="translate(290, 380)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5" />
    <text x="80" y="32" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Payment Service</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Port 3002 • Midtrans</text>
  </g>

  <g transform="translate(520, 380)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5" />
    <text x="80" y="32" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Provisioning Service</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Port 3003 • Socket</text>
  </g>

  <!-- Docker Box -->
  <g transform="translate(740, 380)">
    <rect width="160" height="70" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" />
    <text x="80" y="32" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">Docker Daemon</text>
    <text x="80" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">Bedrock Containers</text>
  </g>

  <!-- Midtrans Box -->
  <g transform="translate(290, 470)">
    <rect width="160" height="24" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <text x="80" y="16" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">Midtrans Payment Gateway</text>
  </g>

  <!-- Connecting Lines -->
  <!-- Client -> Nginx -->
  <line x1="220" y1="155" x2="280" y2="155" stroke="#64748b" stroke-width="1.5" />
  <polygon points="275,151 283,155 275,159" fill="#64748b" />

  <!-- Nginx -> Frontend -->
  <line x1="460" y1="155" x2="520" y2="155" stroke="#64748b" stroke-width="1.5" />
  <polygon points="515,151 523,155 515,159" fill="#64748b" />

  <!-- Nginx -> API Gateway -->
  <line x1="370" y1="190" x2="370" y2="240" stroke="#38bdf8" stroke-width="1.5" />
  <polygon points="366,235 370,243 374,235" fill="#38bdf8" />

  <!-- Gateway -> Auth -->
  <path d="M 310 310 L 140 380" stroke="#64748b" stroke-width="1.5" fill="none" />
  <polygon points="142,372 138,381 148,377" fill="#64748b" />

  <!-- Gateway -> Payment -->
  <line x1="370" y1="310" x2="370" y2="380" stroke="#64748b" stroke-width="1.5" />
  <polygon points="366,373 370,381 374,373" fill="#64748b" />

  <!-- Gateway -> Provisioning -->
  <path d="M 430 310 L 600 380" stroke="#64748b" stroke-width="1.5" fill="none" />
  <polygon points="592,377 602,381 598,372" fill="#64748b" />

  <!-- Payment -> Midtrans -->
  <line x1="370" y1="450" x2="370" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Provisioning -> Docker -->
  <line x1="680" y1="415" x2="740" y2="415" stroke="#38bdf8" stroke-width="1.5" />
  <polygon points="735,411 743,415 735,419" fill="#38bdf8" />
</svg>
